name: MCP Protocol Conformance

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    name: MCP Inspector (tools/list)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      # tools/list only starts the server and enumerates its tool surface; it
      # never invokes a tool, so the foundational sub-servers do not need to be
      # present for this conformance check.
      - name: Install iso20022-readiness-suite-mcp
        run: pip install .

      - name: List tools via MCP Inspector CLI
        run: npx -y @modelcontextprotocol/inspector --cli iso20022-readiness-suite-mcp --method tools/list
